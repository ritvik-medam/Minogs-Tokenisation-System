name: Mingos CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Backend (Node.js + Express)
  # ─────────────────────────────────────────
  backend:
    name: Backend – Install & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors (node --check)
        run: node --check server.js

      - name: Verify server starts (smoke test)
        env:
          PORT: 5001
          MONGODB_URI: mongodb://localhost:27017/mingos_test
          JWT_SECRET: test_secret_ci
          CLIENT_URL: http://localhost:5173
          NODE_ENV: test
        run: |
          # Start server in background, wait briefly, then hit health endpoint
          node server.js &
          SERVER_PID=$!
          sleep 5
          curl --fail http://localhost:5001/ || (kill $SERVER_PID && exit 1)
          kill $SERVER_PID

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

  # ─────────────────────────────────────────
  # JOB 2 — Frontend (React + Vite)
  # ─────────────────────────────────────────
  frontend:
    name: Frontend – Install & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_API_URL: https://placeholder-for-ci.example.com/api
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 3 — Summary gate (blocks merge if either job fails)
  # ─────────────────────────────────────────
  ci-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - run: echo "✅ Backend and Frontend CI both passed!"