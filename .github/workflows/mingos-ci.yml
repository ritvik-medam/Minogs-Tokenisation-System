name: Mingos CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Backend (Node.js + Express)
  # ─────────────────────────────────────────
  backend:
    name: Backend – Lint, Test, Build & Push Docker Image
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors (node --check)
        run: node --check server.js

      # --- DOCKER: Build image and run container test ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Backend container (smoke test)
        env:
          PORT: 5001
          MONGODB_URI: mongodb://mongodb:27017/mingos_test
          JWT_SECRET: test_secret_ci
          CLIENT_URL: http://localhost:5173
          NODE_ENV: test
        run: |
          docker run -d --name backend-test -p 5001:5001 \
            -e PORT=$PORT \
            -e MONGODB_URI=$MONGODB_URI \
            -e JWT_SECRET=$JWT_SECRET \
            -e CLIENT_URL=$CLIENT_URL \
            -e NODE_ENV=$NODE_ENV \
            --network="host" \
            ${{ steps.meta-backend.outputs.tags }}
          sleep 5
          curl --fail http://localhost:5001/ || (docker logs backend-test && exit 1)
          docker stop backend-test && docker rm backend-test

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

  # ─────────────────────────────────────────
  # JOB 2 — Frontend (React + Vite)
  # ─────────────────────────────────────────
  frontend:
    name: Frontend – Install, Build, Build Docker & Push
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_API_URL: https://placeholder-for-ci.example.com/api
        run: npm run build

      - name: Upload build artifact (dist folder)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

      # --- DOCKER: Build and push frontend image (nginx + static files) ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 3 — Summary gate (blocks merge if either job fails)
  # ─────────────────────────────────────────
  ci-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - run: echo "✅ Backend and Frontend CI (including Docker builds) both passed!"